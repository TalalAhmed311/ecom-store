version: '3.8'

services:
  app:
    build: .
    container_name: ecom_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - kafka
      - mongo
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/ecom_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017/ecom_mongo
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - .:/app

  postgres:
    image: postgres:15-alpine
    container_name: ecom_postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ecom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: ecom_redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest
    container_name: ecom_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  kafka:
    image: bitnami/kafka:latest
    container_name: ecom_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
